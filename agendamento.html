<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Agendamento</title>
    <link rel="stylesheet" href="./style/agendamento.css">
</head>

<body>
    <div class="titulo">
        <h1>Agende sua consulta</h1>
        <p>Preencha os dados abaixo para agendar sua consulta</p>
    </div>

    <div class="box">
        <div class="topo-box">
            <img src="assets/CalendarCheck.png" alt="Calendário">
            <h2>Agendamento online</h2>
        </div>

        <form>
            <div class="nome">
                <label for="text">
                    Nome completo
                </label>
                <input type="text" placeholder="Nome completo">
            </div>

            <div class="data-nascimento">
                <label for="date">
                    Data de nascimento
                </label>
                <input type="date">
            </div>

            <div class="area-medica">
                <label">
                    Área médica
                    </label>

                    <select>
                        <option>
                            Especialidade
                        </option>

                        <option>Cardiologia</option>
                        <option>Dermatologia</option>
                        <option>Neurologia</option>
                    </select>
            </div>

            <div class="data">
                <label for="date">
                    Data
                </label>

                <select>
                    <option>
                        Data consulta
                    </option>
                </select>
            </div>


            <div class="horario">
                <label>
                    Horário
                </label>

                <select>
                    <option>
                        Horário
                    </option>
                </select>
            </div>


            <div class="local">
                <label>
                    Local
                </label>

                <select>
                    <option>
                        Selecione o local
                    </option>
                </select>
            </div>


            <div class="motivo">
                <label for="text">
                    Motivo da consulta
                </label>

                <textarea placeholder="Ex: Dor de cabeça"></textarea>
            </div>


            <div>
                <button type="submit" class="btn btn-primary btn-agendar">

                    Confirmar Agendamento
                </button>
            </div>

        </form>
    </div>
</body>

</html>
