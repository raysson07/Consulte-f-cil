<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento</title>
    <link rel="stylesheet" href="./style/agendamento.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <header>
        <nav>
            <li>
                <img src="./assets/logoimg 3.png" alt="" class="logo">
            </li>
            <ul>
                <li> <a href="agendamento.html">Agendamentos</a></li>
                <li> <a href="">Fale Conosco</a></li>
                <li> <button>Portal do Paciente</button></li>
                <li> <button>Portal do Administrador</button></li>
            </ul>
        </nav>
    </header>

    <div class="titulo">
        <h1>Agende sua consulta</h1>
        <p>Preencha os dados abaixo para agendar sua consulta</p>
    </div>

    <div class="box">
        <img src="assets/CalendarCheck.png" alt="">
        <h1>Agendamento Online</h1>

        <form>
            <form class="row g-3">
                <div class="col-md-6">
                    <label for="inputEmail4" class="form-label">Nome completo</label>
                    <input type="text" class="form-control" id="inputtextl4">
                </div>
                <div class="col-md-6">
                    <label for="inputdata4" class="form-label">Data de nascimento</label>
                    <input type="date" class="form-control" id="inputdate4">
                </div>
                <div class="col-12">
                    <label for="inputAddress" class="form-label">Address</label>
                    <input type="text" class="form-control" id="inputAddress" placeholder="1234 Main St">
                </div>
                <div class="col-12">
                    <label for="inputAddress2" class="form-label">Address 2</label>
                    <input type="text" class="form-control" id="inputAddress2"
                        placeholder="Apartment, studio, or floor">
                </div>
                <div class="col-md-6">
                    <label for="inputCity" class="form-label">City</label>
                    <input type="text" class="form-control" id="inputCity">
                </div>
                <div class="col-md-4">
                    <label for="inputState" class="form-label">Área médica</label>
                    <select id="inputState" class="form-select">
                        <option selected>Especialidade</option>
                        <option>...</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label for="inputState" class="form-label">Data</label>
                    <select id="inputState" class="form-select">
                        <option selected>Data consulta</option>
                        <option>

                        </option>
                    </select>

                </div>

                <div class="col-md-4">
                    <label for="inputState" class="form-label">Horário</label>
                    <select id="inputState" class="form-select">
                        <option selected>Horário</option>
                        <option>...</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label for="inputState" class="form-label">Local</label>
                    <select id="inputState" class="form-select">
                        <option selected>Selecione o local</option>
                        <option>...</option>
                    </select>
                </div>


                <div class="col-12">
                    <button type="submit" class="btn btn-primary">Entrar</button>
                </div>
            </form>


        </form>

    </div>




    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
