<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro</title>
  <link rel="stylesheet" href="style/cadastro.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet">
</head>

<body>
  <div class="container">
    <div class="login">
      <div class="logo">
        <ul>
          <li>
            <img src="./assets/logoimg 3.png" alt="">
            <h1>Consulte Fácil</h1>
          </li>
        </ul>
      </div>

      <h2>Cadastro de Paciente</h2>

      <form id="formCadastro">
        <label for="nome">Nome Completo</label>
        <input type="text" id="nome" placeholder="Digite seu nome completo">

        <label for="cpf">CPF ou usuário</label>
        <input type="text" id="cpf" placeholder="Digite seu CPF">

        <label for="telefone">Telefone</label>
        <input type="tel" id="telefone" placeholder="Digite seu telefone">

        <label for="data_nascimento">Data de nascimento</label>
        <input type="date" id="data_nascimento">

        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="Digite seu e-mail">

        <label for="senha" class="senha">Senha</label>
        <input type="password" id="senha" placeholder="Digite sua senha">

        <label for="confirmar_senha" class="senha">Confirme sua senha</label>
        <input type="password" id="confirmar_senha" placeholder="Confirme sua senha">

        <button type="submit">Criar conta</button>

        <a href="login.html">Já possui conta?</a> <a href="login.html">Entrar</a>
      </form>
    </div>
  </div>

  <script src="js/cadastro.js"></script>
</body>

</html>
