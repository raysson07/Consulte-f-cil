<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro</title>
  <link rel="stylesheet" href="style/cadastro.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet">

</head>

<body>
  <div class="container">
    <div class="login">
      <div class="logo">
        <ul>
          <li>
            <img src="./assets/logoimg 3.png" alt="">
            <h1>Consulte Fácil</h1>
          </li>
        </ul>
      </div>

      <h2>Cadastro de Paciente</h2>
      
      <form>
        <label for="usuário">Nome Completo</label>
        <input type="text" placeholder="Digite seu nome completo">

        <label for="cpf">CPF ou usuário</label>
        <input type="text" placeholder="Digite seu CPF">

        <label for="telefone">Telefone</label>
        <input type="tel" placeholder="Digite seu telefone">

        <label for="data">Data de nascimento</label>
        <input type="date" placeholder="Digite sua data de nascimento">

        <label for="email">E-mail</label>
        <input type="email" placeholder="Digite seu e-mail">

        <label for="senha" class="senha">Senha</label>
        <input type="password" placeholder="Digite sua senha">

        <label for="senha" class="senha">Confirme sua senha</label>
        <input type="password" placeholder="Confirme sua senha">

        <button>Criar conta</button>

        <a href="">Já possui conta?</a> <a href="">Entrar</a>
        
      </form>
    </div>
    </div>
  </div>


</body>

</html>
