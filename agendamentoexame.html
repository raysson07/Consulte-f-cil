<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento de Exame</title>
    <link rel="stylesheet" href="./style/agendamentoexame.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>

<body>
    <div class="titulo">
        <h1>Agende seu Exame</h1>
        <p>Preencha os dados abaixo para agendar o seu exame</p>
    </div>

    <div class="box">
        <div class="topo-box">
            <img src="assets/CalendarCheck.png" alt="Calendário">
            <h2>Agendamento online</h2>
        </div>

        <form id="formAgendamentoExame">
            <div class="nome">
                <label for="nome">Nome completo</label>
                <input type="text" id="nome" placeholder="Nome completo">
            </div>

            <div class="data-nascimento">
                <label for="data_nascimento">Data de nascimento</label>
                <input type="date" id="data_nascimento">
            </div>

            <div class="exame-medico">
                <label for="tipoexame">Tipo de exame</label>
                <select id="tipoexame">
                    <option value="">Selecione o exame</option>
                    <option value="Hemograma">Hemograma</option>
                    <option value="Raio-X">Raio-X</option>
                    <option value="Ultrassom">Ultrassom</option>
                    <option value="Eletrocardiograma">Eletrocardiograma</option>
                    <option value="Tomografia">Tomografia</option>
                    <option value="Ressonância Magnética">Ressonância Magnética</option>
                </select>
            </div>

            <div class="data">
                <label for="data_exame">Data</label>
                <input type="date" id="data_exame">
            </div>

            <div class="horario">
                <label for="horario">Horário</label>
                <input type="time" id="horario">
            </div>

            <div class="local">
                <label for="local">Local</label>
                <input type="text" id="local" placeholder="Digite o local">
            </div>

            <div class="motivo">
                <label for="motivo">Motivo do exame</label>
                <textarea id="motivo" placeholder="Ex: Dor de cabeça"></textarea>
            </div>

            <button type="submit" class="btn btn-primary btn-agendar">
                Confirmar Agendamento
            </button>
        </form>
    </div>

    <script src="js/agendamentoexame.js"></script>
</body>

</html>
