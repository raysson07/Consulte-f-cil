<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Paciente</title>
    <link rel="stylesheet" href="style/login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="login">
            <div class="logo">
                <ul>
                    <li>
                        <img src="./assets/logoimg 3.png" alt="">
                        <h1>Consulte Fácil</h1>
                    </li>
                </ul>
            </div>

            <h2>Bem-Vindo</h2>

            <form>
                <label for="usuário">CPF ou usuário</label>
                <input type="text" placeholder="Digite CPF ou usuário">
                <label for="senha" class="senha">Senha</label>
                <input type="password" placeholder="Digite sua senha">

                <button>Entrar</button>

                <a href="">Esqueceu sua senha?</a>
                <a href="">Não possui conta? Cadastrar-se</a>
            </form>
        </div>
    </div>


</body>

</html>
