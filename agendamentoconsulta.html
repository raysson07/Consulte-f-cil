<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Agendamento</title>
    <link rel="stylesheet" href="./style/agendamento.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="titulo">
        <h1>Agende sua consulta</h1>
        <p>Preencha os dados abaixo para agendar sua consulta</p>
    </div>

    <div class="box">
        <div class="topo-box">
            <img src="assets/CalendarCheck.png" alt="Calendário">
            <h2>Agendamento online</h2>
        </div>

        <form id="formAgendamento">
            <div class="nome">
                <label for="nome">
                    Nome completo
                </label>
                <input type="text" id="nome" placeholder="Nome completo">
            </div>

            <div class="data-nascimento">
                <label for="data_nascimento">
                    Data de nascimento
                </label>
                <input type="date" id="data_nascimento">
            </div>
            <br>
            <div class="area-medica">
                <label for="especialidade">
                    Área médica
                </label>
                <select id="especialidade">
                    <option>Especialidade</option>
                    <option>Cardiologia</option>
                    <option>Dermatologia</option>
                    <option>Neurologia</option>
                </select>
            </div>

            <div class="data">
                <label for="data_consulta">
                    Data
                </label>
                <select id="data_consulta">
                    <option>Data consulta</option>
                </select>
            </div>

            <div class="horario">
                <label for="horario">
                    Horário
                </label>
                <select id="horario">
                    <option>Horário</option>
                </select>
            </div>

            <div class="local">
                <label for="local">
                    Local
                </label>
                <select id="local">
                    <option>Selecione o local</option>
                </select>
            </div>

            <div class="motivo">
                <label for="motivo">
                    Motivo da consulta
                </label>
                <textarea id="motivo" placeholder="Ex: Dor de cabeça"></textarea>
            </div>

            <div>
                <button type="submit" class="btn btn-primary btn-agendar">
                    Confirmar Agendamento
                </button>
            </div>
        </form>
    </div>

    <script src="js/agendamento.js"></script>
</body>

</html>
