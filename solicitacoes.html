<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitações</title>
    <link rel="stylesheet" href="style/solicitacoes.css">
</head>

<body>

    <div class="layout">
        <nav>
            <div id="sidebar">
                <div id="logo">
                    <img src="./assets/logoimgwhite.png" id="logo_consultefacil">
                    <div id="logo_infos">
                        <span>Consulte Fácil</span>
                        <span>Portal do Administrador</span>
                    </div>
                </div>

                <ul id="side_items">
                    <li class="side-item"><a href="#"><span class="item-description">Início</span></a></li>
                    <li class="side-item"><a href="#"><span class="item-description">Solicitações</span></a></li>
                    <li class="side-item"><a href="#"><span class="item-description">Serviços</span></a></li>
                </ul>
            </div>

            <div id="sair">
                <button id="sair_btn">Sair</button>
            </div>
        </nav>

        <div class="main">
            <div class="top">
                <span>Portal do Administrador</span>
                <span>Bem-Vindo</span>
            </div>

            <section class="dashboard">
                <h1>Solicitações</h1>
                <p>Gerencie todas as Solicitações</p>
                <div class="cards-container">
                    <div class="card1">
                        <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" fill="currentColor" class="svg1"
                            viewBox="0 0 16 16">
                            <path
                                d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4m-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10s-3.516.68-4.168 1.332c-.678.678-.83 1.418-.832 1.664z" />
                        </svg>
                        <div class="detalhes">
                            <h1 class="numero" id="cnt-pacientes">0</h1>
                            <p>Pacientes</p>
                        </div>
                    </div>

                    <div class="card2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" fill="currentColor" class="svg2"
                            viewBox="0 0 16 16">
                            <path
                                d="M8 7a.5.5 0 0 1 .5.5V9H10a.5.5 0 0 1 0 1H8.5v1.5a.5.5 0 0 1-1 0V10H6a.5.5 0 0 1 0-1h1.5V7.5A.5.5 0 0 1 8 7" />
                            <path
                                d="M3.5 0a.5.5 0 0 1 .5.5V1h8V.5a.5.5 0 0 1 1 0V1h1a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V3a2 2 0 0 1 2-2h1V.5a.5.5 0 0 1 .5-.5M1 4v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V4z" />
                        </svg>
                        <div class="detalhes">
                            <h1 class="numero" id="cnt-agendamentos">0</h1>
                            <p>Agendamentos</p>
                        </div>
                    </div>

                    <div class="card3">
                        <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" fill="currentColor" class="svg3"
                            viewBox="0 0 16 16">
                            <path
                                d="M2 1.5a.5.5 0 0 1 .5-.5h11a.5.5 0 0 1 0 1h-1v1a4.5 4.5 0 0 1-2.557 4.06c-.29.139-.443.377-.443.59v.7c0 .213.154.451.443.59A4.5 4.5 0 0 1 12.5 13v1h1a.5.5 0 0 1 0 1h-11a.5.5 0 1 1 0-1h1v-1a4.5 4.5 0 0 1 2.557-4.06c.29-.139.443-.377.443-.59v-.7c0-.213-.154-.451-.443-.59A4.5 4.5 0 0 1 3.5 3V2h-1a.5.5 0 0 1-.5-.5m2.5.5v1a3.5 3.5 0 0 0 1.989 3.158c.533.256 1.011.791 1.011 1.491v.702c0 .7-.478 1.235-1.011 1.491A3.5 3.5 0 0 0 4.5 13v1h7v-1a3.5 3.5 0 0 0-1.989-3.158C8.978 9.586 8.5 9.052 8.5 8.351v-.702c0-.7.478-1.235 1.011-1.491A3.5 3.5 0 0 0 11.5 3V2z" />
                        </svg>
                        <div class="detalhes">
                            <h1 class="numero" id="cnt-aguardando">0</h1>
                            <p>Aguardando</p>
                        </div>
                    </div>
                </div>

                <div class="lista">
                    <h3 class="titulo">Lista de solicitações</h3>
                    <div class="item">
                        <div class="info">
                            <span class="nome">Raysson Mendes</span>
                            <span class="meta">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                                    <polyline points="14 2 14 8 20 8" />
                                </svg>
                                Consulta
                            </span>
                            <span class="meta">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                                    <line x1="16" y1="2" x2="16" y2="6" />
                                    <line x1="8" y1="2" x2="8" y2="6" />
                                    <line x1="3" y1="10" x2="21" y2="10" />
                                </svg>
                                Solicitado: 00/00/0000
                            </span>
                        </div>
                        <div class="botao">
                            <button class="confirmar">Confirmar</button>
                            <button class="cancelar">Cancelar</button>
                        </div>
                    </div>
                </div>

                <a href="#" class="ver-mais">Ver mais</a>
        </div>


    </div>
    </section>
    </div>
    </div>
</body>

</html>
